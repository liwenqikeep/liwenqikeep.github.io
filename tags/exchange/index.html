                <a href="https://liwenqikeep.github.io/tag/amqp/" class="tag">AMQP</a>
                
                
            </div>
            <p class="post-excerpt">前言 RabbitMQ 是最流行的开源消息代理之一，基于 AMQP 0-9-1 协议实现。与 Kafka 的流处理定位不同，RabbitMQ 侧重于灵活的消息路由、可靠的消息投递和多协议支持。
本文从核心概念出发，逐步覆盖 RabbitMQ 的架构设计、通信模型和基础操作。
</p>
